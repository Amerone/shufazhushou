name: moyun
description: "Moyun calligraphy teaching assistant"
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.6
  share_plus: ^12.0.1
  flutter_secure_storage: ^9.2.4
  cryptography: ^2.9.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  intl: ^0.20.2
  uuid: ^4.4.2
  restart_app: ^1.2.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
    - family: MaShanZheng
      fonts:
        - asset: assets/fonts/MaShanZheng-Regular.ttf

  assets:
    - assets/fonts/
